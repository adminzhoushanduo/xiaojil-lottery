<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🔐 管理员后台 - 小吉的魔法抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;background:linear-gradient(135deg,#FFF0F5 0%,#FFE4E1 30%,#F8E8FF 70%,#E6E6FA 100%);color:#555;padding:20px}.ac{max-width:500px;margin:0 auto}.hd{text-align:center;padding:18px 0 10px}.hd h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,#FF69B4,#BA55D3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.hd .sub{font-size:13px;color:#b088b0;margin-top:4px}.card{background:rgba(255,255,255,0.85);backdrop-filter:blur(10px);border-radius:16px;padding:20px;box-shadow:0 4px 15px rgba(0,0,0,0.1);margin-bottom:16px}.card h3{font-size:16px;color:#BA55D3;margin-bottom:12px;text-align:center}.login .pi{display:flex;gap:8px;margin-bottom:8px}.login .pi input{flex:1;padding:10px 14px;border:2px solid #eee;border-radius:12px;font-size:15px;outline:none;transition:border-color 0.3s}.login .pi input:focus{border-color:#FF69B4}.login .pi button{padding:10px 20px;background:#FF69B4;border:none;border-radius:12px;color:#fff;font-weight:600;cursor:pointer;font-size:14px}.login .pi button:hover{background:#DB7093}.login .hint{text-align:center;font-size:12px;color:#ccc;margin-top:6px}.item{background:#fafafa;border-radius:12px;padding:14px 16px;margin-bottom:10px}.item .top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.item .info{flex:1}.item .iname{font-size:15px;font-weight:600;color:#555}.item .icontent{font-size:13px;color:#888;margin-top:6px;padding:8px 10px;background:#f0f0f0;border-radius:8px;line-height:1.4;word-break:break-all}.item .idate{font-size:11px;color:#bbb;margin-top:4px}.item .actions{display:flex;gap:6px;flex-shrink:0}.item .actions button{padding:6px 14px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}.item .actions .ba{background:#28a745;color:#fff}.item .actions .br{background:#dc3545;color:#fff}.empty{text-align:center;padding:30px 0;color:#ccc;font-size:14px}.stats{display:flex;justify-content:center;gap:20px;margin-bottom:16px;font-size:13px;color:#888}.stats span{background:rgba(255,255,255,0.8);padding:6px 14px;border-radius:10px}.stats .nm{font-weight:700;font-size:16px}.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;padding:10px 24px;border-radius:12px;font-size:14px;z-index:2000;animation:ti 0.3s ease-out;pointer-events:none}@keyframes ti{0%{transform:translateX(-50%) translateY(-30px);opacity:0}100%{transform:translateX(-50%) translateY(0);opacity:1}}.nav{text-align:center;margin:16px 0;font-size:13px}.nav a{color:#FF69B4;text-decoration:none}.nav a:hover{text-decoration:underline}.st{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}.st.pd{background:#fff3cd;color:#856404}.st.ap{background:#cce5ff;color:#0056b3}.st.rj{background:#f8d7da;color:#721c24}.hist-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}.hist-item:last-child{border-bottom:none}.hist-item .he{font-size:20px;width:28px;text-align:center}.hist-item .hn{flex:1}.hist-item .hd2{color:#bbb;font-size:11px}</style>
</head>
<body>
<div id="toast"></div>
<div class="ac"><div class="hd"><h1>🔐 管理员后台</h1><div class="sub">小吉的魔法抽奖 · 审核管理</div></div>
<div class="card login" id="loginCard"><h3>🔑 管理员登录</h3><div class="pi"><input type="password" id="pwdInput" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter')login()"><button onclick="login()">解锁</button></div><div class="hint">💡 默认密码：5201314（可在 index.html 中修改）</div></div>
<div id="adminContent" style="display:none">
<div class="stats"><span>💎 钻石：<span class="nm" id="statDia">0</span></span><span>🧩 碎片：<span class="nm" id="statShard">0</span></span><span>🎯 额外次数：<span class="nm" id="statExtra">0</span></span><span>🔒 保底：<span class="nm" id="statPity">0</span>/100</span></div>
<div style="text-align:center;margin-bottom:10px"><button onclick="resetTasks()" style="background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:20px;padding:6px 16px;color:#fff;font-size:12px;font-weight:700;cursor:pointer">🔄 手动刷新任务</button></div>
<div class="card" id="pendingCard"><h3>📋 待审核任务 <span id="pendingCount" style="font-size:12px;color:#999"></span></h3><div id="pendingList"></div></div>
<div class="card" id="historyCard"><h3>📜 审核历史</h3><div id="historyList"></div></div>
<div class="nav">← <a href="index.html">返回抽奖页面</a></div>
</div></div>
<div class="toast" id="toastEl" style="display:none"></div>
<script>
var AP="5201314",SK="zmx_v5";
async function loadD(){try{var r=await fetch("/api/data");var d=await r.json();if(d&&d.tasks){localStorage.setItem(SK,JSON.stringify(d));return d}}catch(e){}return loadLocal()}function loadLocal(){try{var r=localStorage.getItem(SK);if(r)return JSON.parse(r)}catch(e){}return null}
function svD(d){if(typeof d.lastResetDate!=="string")d.lastResetDate=TD;localStorage.setItem(SK,JSON.stringify(d));fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}).catch(function(){})}
function st(msg){var el=document.getElementById("toastEl");el.textContent=msg;el.style.display="block";clearTimeout(el._t);el._t=setTimeout(function(){el.style.display="none"},2500)}
function login(){if(document.getElementById("pwdInput").value===AP){document.getElementById("adminContent").style.display="block";document.getElementById("loginCard").style.display="none";render();st("🔓 欢迎回来，管理员！")}else{document.getElementById("pwdInput").style.borderColor="#dc3545";st("❌ 密码错误")}}
async function render(){var d=await loadD();if(!d){document.getElementById("pendingList").innerHTML='<div class="empty">📭 还没有数据，先去抽奖页面玩一玩吧～</div>';return}// 统计
document.getElementById("statDia").textContent=d.diamond||0;document.getElementById("statShard").textContent=d.shardCount||0;document.getElementById("statExtra").textContent=d.extraChances||0;document.getElementById("statPity").textContent=d.pityCount||0;
// 待审核
var pd=(d.tasks||[]).filter(function(s){return s.status==="submitted"});var pc=document.getElementById("pendingList");var pcc=document.getElementById("pendingCount");if(!pd.length){pc.innerHTML='<div class="empty">🎉 没有待审核的任务</div>';pcc.textContent=""}else{pcc.textContent="("+pd.length+"条)";pc.innerHTML=pd.map(function(st){var t=(TASKS||[]).find(function(x){return x.id===st.id});var tn=t?t.emoji+" "+t.name:st.id;var ct=st.content?'<div class="icontent">💬 '+st.content+'</div>':"";var dd=st.submitDate?'<div class="idate">📅 提交于 '+st.submitDate+'</div>':"";return'<div class="item"><div class="top"><div class="info"><div class="iname">'+tn+'</div>'+ct+dd+'</div><div class="actions"><button class="ba" onclick="ap(\''+st.id+'\')">✅ 通过</button><button class="br" onclick="rj(\''+st.id+'\')">❌ 拒绝</button></div></div></div>'}).join("")}
var allTasks=(d.tasks||[]).filter(function(s){return s.status==="approved"||s.status==="rejected"});var hc=document.getElementById("historyList");if(!allTasks.length){hc.innerHTML='<div class="empty">暂无审核记录</div>'}else{hc.innerHTML=allTasks.slice().reverse().map(function(st){var t=(TASKS||[]).find(function(x){return x.id===st.id});var tn=t?t.emoji+" "+t.name:st.id;var lb=st.status==="approved"?"已通过":"已拒绝";var cl=st.status==="approved"?"ap":"rj";var ct=st.content?'<div style="font-size:12px;color:#999;margin-top:2px">'+st.content+'</div>':"";return'<div class="hist-item"><span class="he">'+(t?t.emoji:"")+'</span><span class="hn">'+tn+'<span class="st '+cl+'">'+lb+'</span>'+ct+'</span></div>'}).join("")}
}
async function ap(id){var d=await loadD();if(!d)return;var st=d.tasks.find(function(s){return s.id===id});if(!st)return;st.status="approved";d.extraChances=(d.extraChances||0)+1;svD(d);render();st("✅ 已通过！沐汐获得一次额外抽奖机会 🎉")}
async function rj(id){var d=await loadD();if(!d)return;var st=d.tasks.find(function(s){return s.id===id});if(!st)return;st.status="rejected";svD(d);await render();st("❌ 已拒绝，让沐汐再试一次吧")}

// 手动刷新任务
async function resetTasks(){if(!confirm("确定要刷新所有已完成/已拒绝的任务吗？"))return;var d=await loadD();if(!d||!d.tasks)return;d.tasks.forEach(function(t){if(t.status==="approved"||t.status==="rejected"){t.status="todo";t.content="";t.submitDate=null}});svD(d);render();st("✅ 任务已刷新！")}
var TASKS=[{id:"t1",emoji:"🧸",name:"自己收拾玩具"},{id:"t2",emoji:"🪥",name:"自己刷牙洗脸"},{id:"t3",emoji:"🎨",name:"画一幅画送给爸爸妈妈"},{id:"t4",emoji:"🧹",name:"帮忙做一件家务"},{id:"t5",emoji:"📖",name:"读一本小故事书"},{id:"t6",emoji:"👗",name:"自己穿好衣服"},{id:"t7",emoji:"🌙",name:"10点之前关灯睡觉"},{id:"t8",emoji:"💆",name:"给妈妈按摩5分钟"},{id:"t9",emoji:"✏️",name:"自己独立完成作业"},{id:"t10",emoji:"🍚",name:"积极主动吃饭"},{id:"t11",emoji:"📵",name:"不玩手机 不看电视"}];
setInterval(function(){render()},5000);
</script>
</body>
</html>
