function def(){return{lastDrawDate:null,extraChances:0,ownedGifts:[],history:[],diamond:0,shardCount:0,pityCount:0,tasks:TASKS.map(function(t){return{id:t.id,status:"todo",content:"",submitDate:null}}),firstVisit:true,lastResetDate:null}}
async function initData(){if(location.protocol==="file:"){var ld=loadLocal();D=ld||def();if(!D.tasks)D=def();TASKS.forEach(function(t){if(!(D.tasks||[]).find(function(s){return s.id===t.id})){D.tasks.push({id:t.id,status:"todo",content:"",submitDate:null})}});return}try{var r=await fetch("/api/data");var d=await r.json();if(d&&d.tasks){localStorage.setItem(SK,JSON.stringify(d));D=d;return}}catch(e){}var ld=loadLocal();D=ld||def();if(!D.tasks)D=def()}

var curTaskId=null;
function renderGrid(){var g=document.getElementById("slotGrid"),ly=[0,1,2,7,8,3,6,5,4],h="";ly.forEach(function(pos){if(pos===8){h+='<div class="sc ct" data-idx="8" data-type="jackpot"><img class="jp-img" src="'+IP+'" alt="塞罗奥特曼" onclick="showBigImg()"><span class="cn">🏆塞罗奥特曼</span><span class="jb">👑终极</span></div>'}else{var o=O[pos];if(!o)return;var ec="",tc="";if(o.type==="dia"){ec="💎";tc="dia"}else if(o.type==="shard"){ec="🧩";tc="shrd"}else{ec="😅";tc="miss"}h+='<div class="sc ot" data-idx="'+pos+'" data-type="'+o.type+'"><span class="tag '+tc+'">'+ec+'</span><span class="ce">'+o.emoji+'</span><span class="cn">'+o.name+'</span></div>'}});g.innerHTML=h}
function roll(){if(D.pityCount>=99){D.pityCount=0;return{type:"jackpot",gift:CEN,idx:8,amt:0,pity:true}}var r=Math.random()*TW;if(r<PJW){D.pityCount=0;return{type:"jackpot",gift:CEN,idx:8,amt:0,pity:false}}D.pityCount++;r-=PJW;if(r<P20W)return{type:"dia",gift:O[5],idx:5,amt:20};r-=P20W;if(r<P10W)return{type:"dia",gift:O[1],idx:1,amt:10};r-=P10W;if(r<PS2W)return{type:"shard",gift:O[4],idx:4,amt:2};r-=PS2W;if(r<PS1W)return{type:"shard",gift:O[3],idx:3,amt:1};r-=PS1W;if(r<PGW)return{type:"gift",gift:O[6],idx:6,amt:0};var m=[0,2],g=O[m[Math.floor(Math.random()*m.length)]];return{type:"miss",gift:g,idx:g.idx,amt:0}}
var spin=false;
function startDraw(){if(spin)return;if(tod()+D.extraChances<=0)return;spin=true;var btn=document.getElementById("drawBtn");btn.disabled=true;btn.innerHTML='🎰 转动中...<span class="bs">✨ 好运快来 ✨</span>';if(tod()>0)D.lastDrawDate=TD;else D.extraChances--;upd();var res=roll();var wi=res.idx,isJP=res.type==="jackpot",da=res.amt||0,isPity=res.pity;if(isJP){D.ownedGifts.push("jackpot");playJP()}else if(res.type==="dia"){D.diamond+=da;playTick()}else if(res.type==="shard"){D.shardCount+=da;playTick()}else{playMiss()}var ht=isJP?"jackpot":res.type;D.history.push({type:ht,amount:da,date:TD,name:res.gift.name,emoji:res.gift.emoji});sv();spinAnim(wi,function(){var em=document.getElementById("resultEmoji");if(isJP){em.innerHTML='<img src="'+IP+'" style="width:60px;height:60px;border-radius:8px;object-fit:cover;cursor:pointer" onclick="showBigImg()">';playJPwin();document.getElementById("resultBadge").textContent=isPity?"🌈 保底触发！终极大奖！！🌈":"👑 终极大奖！！👑"}else{em.textContent=res.gift.emoji;playWin();document.getElementById("resultBadge").textContent="🎉 恭喜！"}document.getElementById("resultName").textContent=res.gift.name;var d=res.gift.desc;if(res.type==="dia")d+=" (+"+da+"钻石)";else if(res.type==="shard")d+=" (+"+da+"碎片)";document.getElementById("resultDesc").textContent=d;document.getElementById("resultBadge").className="rb3"+(isJP?" jp":"");document.getElementById("resultOverlay").classList.add("active");if(isJP)confetti();btn.disabled=false;btn.innerHTML='🎰 转起来！<span class="bs">点我试试手气</span>';spin=false;updAll()})}
function spinAnim(ti,cb){var cells=document.querySelectorAll(".sc"),c=0,total=20+Math.floor(Math.random()*10);cells.forEach(function(x){x.classList.remove("hl","spin","win")});function go(){cells.forEach(function(x){x.classList.remove("hl")});if(c>=total){cells[ti].classList.add("hl","win");setTimeout(cb,400);return}var p=c/total,delay=p<0.5?60+Math.random()*30:100+p*250,idx;if(c<total-3){idx=Math.floor(Math.random()*9)}else{var s=total-c;idx=s===3?(ti>0?ti-1:1):ti}cells[idx].classList.add("hl","spin");playTick();setTimeout(function(){cells[idx].classList.remove("spin")},delay*0.5);c++;setTimeout(go,delay)}go()}
function showBigImg(){document.getElementById("imgViewer").classList.add("active")}
function closeImgViewer(){document.getElementById("imgViewer").classList.remove("active")}
function upd(){document.getElementById("freeChance").textContent=tod();document.getElementById("extraChance").textContent=D.extraChances;if(tod()+D.extraChances<=0){document.getElementById("drawBtn").disabled=true;document.getElementById("drawBtn").innerHTML='🎰 明天再来吧<span class="bs">🌙 攒好运气明天来</span>'}else{document.getElementById("drawBtn").disabled=false;document.getElementById("drawBtn").innerHTML='🎰 转起来！<span class="bs">点我试试手气</span>'}}
function updDia(){var p=Math.min(100,D.diamond/50*100);document.getElementById("diaFill").style.width=p+"%";document.getElementById("diaText").textContent=D.diamond+"/50";document.getElementById("exchangeDiaBtn").classList.toggle("show",D.diamond>=50)}
function updShard(){var p=Math.min(100,D.shardCount/50*100);document.getElementById("shardFill").style.width=p+"%";document.getElementById("shardText").textContent=D.shardCount+"/50";document.getElementById("exchangeShardBtn").classList.toggle("show",D.shardCount>=50)}
function speakTask(id,btn){try{var t=TASKS.find(function(x){return x.id===id});if(!t)return;if(btn)btn.classList.add("sg");speechSynthesis.cancel();var m=new SpeechSynthesisUtterance(t.name+"。"+t.desc);m.rate=0.9;m.onend=function(){if(btn)btn.classList.remove("sg")};m.onerror=function(){if(btn)btn.classList.remove("sg")};speechSynthesis.speak(m)}catch(e){if(btn)btn.classList.remove("sg")}}

function renderTasks(){var c=document.getElementById("taskList");c.innerHTML=TASKS.map(function(t){var st=D.tasks.find(function(s){return s.id===t.id})||{status:"todo",content:""};var m={todo:{label:"去做任务！",cls:"td",click:true},done:{label:"✅ 已完成",cls:"dn",click:true},submitted:{label:"⏳ 审核中",cls:"sb3",click:false},approved:{label:"✅ 已通过",cls:"ap",click:false},rejected:{label:"❌ 重做",cls:"rj",click:true}};var s=m[st.status]||m.todo;var ext=st.content&&st.status==="submitted"?'<div class="acontent">'+st.content+'</div>':"";return'<div class="tk"><div class="ti">'+t.emoji+'</div><div class="tif"><div class="tname">'+t.name+'</div><div class="tdesc">'+t.desc+'</div>'+ext+'</div><button class="spk" onclick="speakTask(\'' + t.id + '\',this)">🔊</button><button class="ts '+s.cls+'" onclick="handleTaskClick(\''+t.id+'\')"'+(s.click?"":" disabled")+'>'+s.label+'</button></div>'}).join("")}
function renderGallery(){var c=document.getElementById("galleryGrid");var h="",s={};O.forEach(function(g){var k=g.type+g.name;if(s[k])return;s[k]=true;h+='<div class="gc"><span class="ge">'+g.emoji+'</span><div class="gn">'+g.name+'</div></div>'});var hasJP=D.ownedGifts.includes("jackpot");h+='<div class="gc jc'+(hasJP?" own":"")+'"><span class="go">✅</span><span class="ge"><img src="'+IP+'" style="width:32px;height:32px;border-radius:4px;object-fit:cover;display:inline-block;vertical-align:middle"></span><div class="gn">🏆 塞罗奥特曼</div></div>';h+='<div class="gc'+(D.diamond>0?" own":"")+'"><span class="go">✅</span><span class="ge">💎</span><div class="gn">钻石 x'+D.diamond+'</div></div>';h+='<div class="gc'+(D.shardCount>0?" own":"")+'"><span class="go">✅</span><span class="ge">🧩</span><div class="gn">碎片 x'+D.shardCount+'</div></div>';c.innerHTML=h}
function renderHistory(){var c=document.getElementById("historyList");if(!D.history.length){c.innerHTML='<div class="he2">🌟 还没有抽过奖呢，快去试试手气吧！</div>';return}c.innerHTML=D.history.slice().reverse().map(function(h){var cls="";if(h.type==="miss")cls="miss";else if(h.type==="dia")cls="dia";else if(h.type==="shard")cls="shrd";else if(h.type==="jackpot"||h.type==="exchange")cls="jp";var dt=h.name;if(h.amount>0&&h.type!=="exchange")dt+=" +"+h.amount+(h.type==="dia"?"💎":"🧩");return'<div class="hi"><span class="he">'+h.emoji+'</span><span class="hn '+cls+'">'+dt+'</span><span class="hd2">'+h.date+'</span></div>'}).join("")}
function renderAdmin(){var c=document.getElementById("adminList");var pd=D.tasks.filter(function(s){return s.status==="submitted"});if(!pd.length){c.innerHTML='<p style="text-align:center;color:#bbb;padding:10px;font-size:13px;">🎉 没有待审核的任务</p>';return}c.innerHTML=pd.map(function(st){var t=TASKS.find(function(x){return x.id===st.id});if(!t)return"";var ct=st.content?'<div class="acontent">💬 '+st.content+'</div>':"";return'<div class="ai"><div><span>'+t.emoji+' '+t.name+'</span>'+ct+'</div><div class="aa"><button class="ba" onclick="approveTask(\''+st.id+'\')">✅ 通过</button><button class="br" onclick="rejectTask(\''+st.id+'\')">❌ 拒绝</button></div></div>'}).join("")}
function updAll(){upd();updDia();updShard();renderTasks();renderGallery();renderHistory()}
function openTaskModal(id){curTaskId=id;document.getElementById("taskModalTitle").textContent="📝 "+TASKS.find(function(t){return t.id===id}).name;document.getElementById("taskContent").value="";document.getElementById("taskModal").classList.add("active")}
function closeTaskModal(){document.getElementById("taskModal").classList.remove("active");curTaskId=null}
function submitTask(){if(!curTaskId){closeTaskModal();return}var content=document.getElementById("taskContent").value.trim();if(!content){showToast("请描述你完成了什么～");return}var st=D.tasks.find(function(s){return s.id===curTaskId});if(!st)return;st.status="submitted";st.content=content;st.submitDate=TD;sv();closeTaskModal();renderTasks();showToast("📤 已提交审核，等妈妈/爸爸批准吧～")}
function handleTaskClick(id){var st=D.tasks.find(function(s){return s.id===id});if(!st){D.tasks.push({id:id,status:"todo",content:"",submitDate:null});st=D.tasks[D.tasks.length-1];sv()}if(st.status==="todo"){openTaskModal(id)}else if(st.status==="done"){openTaskModal(id)}else if(st.status==="rejected"){st.status="todo";st.content="";sv();renderTasks();showToast("💪 加油，再做一次吧！")}}
function toggleAdmin(){document.getElementById("adminPanel").classList.toggle("act")}
function unlockAdmin(){if(document.getElementById("adminPwd").value===AP){document.getElementById("adminContent").style.display="block";document.getElementById("adminPwd").style.borderColor="#28a745";renderAdmin();showToast("🔓 管理员已登录")}else{document.getElementById("adminPwd").style.borderColor="#dc3545";showToast("❌ 密码错误")}}
function approveTask(id){var st=D.tasks.find(function(s){return s.id===id});if(!st)return;st.status="approved";D.extraChances++;sv();renderAdmin();renderTasks();upd();showToast("✅ 已通过！沐汐获得一次额外抽奖机会 🎉")}
function rejectTask(id){var st=D.tasks.find(function(s){return s.id===id});if(!st)return;st.status="rejected";sv();renderAdmin();renderTasks();showToast("❌ 已拒绝，让沐汐再试一次吧")}
function closeResult(){document.getElementById("resultOverlay").classList.remove("active")}
function switchTab(t){var tb=["lottery","tasks","gallery","history"];document.querySelectorAll(".tn button").forEach(function(b,i){b.classList.toggle("act",tb[i]===t)});document.querySelectorAll(".tc").forEach(function(e){e.classList.remove("act")});document.getElementById("tab"+t.charAt(0).toUpperCase()+t.slice(1)).classList.add("act")}
function exchangeDiamond(){if(D.diamond<50)return;D.diamond-=50;D.extraChances++;D.history.push({type:"exchange",amount:-50,date:TD,name:"钻石兑换抽奖",emoji:"🎰"});sv();updAll();showToast("🎉 消耗50钻石，获得一次抽奖机会！");playWin()}
function exchangeShard(){if(D.shardCount<50)return;D.shardCount-=50;D.ownedGifts.push("jackpot");D.history.push({type:"exchange",amount:-50,date:TD,name:"碎片兑换塞罗奥特曼",emoji:"🌟"});sv();updAll();showToast("🎉 兑换成功！沐汐获得了塞罗奥特曼！");playJPwin();confetti()}
var actx=null;function ga(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function playTick(){try{var a=ga(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=500+Math.random()*500;o.type="sine";g.gain.setValueAtTime(0.08,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.04);o.start(a.currentTime);o.stop(a.currentTime+0.04)}catch(ex){}}
function playWin(){try{var a=ga();[523,659,784,1047].forEach(function(f,i){var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=f;o.type="sine";g.gain.setValueAtTime(0.12,a.currentTime+i*0.12);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+i*0.12+0.25);o.start(a.currentTime+i*0.12);o.stop(a.currentTime+i*0.12+0.25)})}catch(ex){}}
function playJP(){try{var a=ga();[440,554,659,880].forEach(function(f,i){var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=f;o.type="triangle";g.gain.setValueAtTime(0.2,a.currentTime+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+i*0.1+0.35);o.start(a.currentTime+i*0.1);o.stop(a.currentTime+i*0.1+0.35)})}catch(ex){}}
function playJPwin(){try{var a=ga();[523,659,784,1047,1319,1568,2093].forEach(function(f,i){var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=f;o.type="triangle";g.gain.setValueAtTime(0.2,a.currentTime+i*0.15);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+i*0.15+0.5);o.start(a.currentTime+i*0.15);o.stop(a.currentTime+i*0.15+0.5)})}catch(ex){}}
function playMiss(){try{var a=ga(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=260;o.type="sawtooth";g.gain.setValueAtTime(0.06,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.15);o.start(a.currentTime);o.stop(a.currentTime+0.15)}catch(ex){}}
